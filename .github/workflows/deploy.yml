name: Deploy to GitHub Pages

# Build the Vite site and publish it to GitHub Pages on every push to main.
# You never build locally — GitHub does it. You can also run it by hand from the
# Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs (least privilege).
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice quickly, cancel the older in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        # Playwright is only used for local QA (scripts/qa.mjs); skip its browser
        # download in CI so the install stays fast and can't fail on the network.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
